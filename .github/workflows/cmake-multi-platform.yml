name: Qt CMake Build

on:
push:
branches: [ "main" ]

pull_request:
branches: [ "main" ]

jobs:

build:

```
runs-on: windows-latest

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Install Qt
    uses: jurplel/install-qt-action@v3

    with:
      version: "6.7.0"

  - name: Setup MSVC
    uses: ilammy/msvc-dev-cmd@v1

  - name: Configure CMake
    run: cmake -B build

  - name: Build
    run: cmake --build build --config Release
```
